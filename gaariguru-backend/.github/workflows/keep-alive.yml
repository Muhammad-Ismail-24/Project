name: Keep Render Backend Alive

on:
  schedule:
    # Runs every 14 minutes to beat the 15-minute sleep timer
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows you to run it manually from the Actions tab if needed

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API Root
        run: |
          curl -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/115.0.0.0 Safari/537.36" -s https://carfinder-project-backend.onrender.com/ > /dev/null
        
      - name: Log Success
        run: echo "Successfully pinged the GaariGuru backend!"